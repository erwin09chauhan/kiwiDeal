services:
  postgres:
    image: postgres:17
    container_name: kiwi_deal_db
    environment:
      POSTGRES_USER: kiwiadmin
      POSTGRES_PASSWORD: kiwipassword
      POSTGRES_DB: kiwidealddb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    restart: unless-stopped
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: kiwi_deal_storage
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --skipApiVersionCheck
    restart: unless-stopped
volumes:
  postgres_data:
  azurite_data:
